<style>
  :root {

    background: var(--bg);

    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle, #FF6B6B22 2px, transparent 2px),
      radial-gradient(circle, #FFD93D22 2px, transparent 2px),
      radial-gradient(circle, #6BCB7722 2px, transparent 2px),
      radial-gradient(circle, #4D96FF22 2px, transparent 2px);
    background-size: 60px 60px, 80px 80px, 70px 70px, 90px 90px;
    background-position: 0 0, 30px 30px, 15px 55px, 45px 10px;
    pointer-events: none;
    z-index: 0;
  }
  h1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--text);
    letter-spacing: 1px;
    margin-bottom: 4px;
    position: relative;
    z-index: 1;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  /* WHEEL */
  .wheel-wrap {
    position: relative;
    width: min(420px, 92vw);
    height: min(420px, 92vw);
    z-index: 1;
    margin-top: 12px;
  }
  canvas#wheel {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 12px 40px rgba(0,0,0,0.18));
  }
  /* Pointer — top centre, pointing down into wheel */
  .pointer {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-top: 30px solid #2d2d2d;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.28));
    z-index: 10;
  }
  /* Simple decorative hub — no click */
  .hub {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 26px; height: 26px;
    background: white;
    border-radius: 50%;
    border: 3px solid rgba(0,0,0,0.22);
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    z-index: 10;
    pointer-events: none;
  }

  /* Spin button */
  .spin-btn {
    position: relative;
    z-index: 1;
    margin-top: 30px;
    background: linear-gradient(135deg, #FF6B6B, #FFD93D);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 16px 60px;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 1.8rem;
    cursor: pointer;
    box-shadow: 0 6px 22px rgba(255,107,107,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .spin-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255,107,107,0.5); }
  .spin-btn:active:not(:disabled) { transform: translateY(1px); }
  .spin-btn:disabled { opacity: 0.55; cursor: not-allowed; }

  /* RESULT OVERLAY */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(4px);
  }
  .overlay.show { display: flex; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  .result-card {
    background: white;
    border-radius: 28px;
    padding: 36px 32px 28px;
    max-width: 460px; width: 100%;
    text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.25);
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from { transform:scale(0.7); opacity:0 } to { transform:scale(1); opacity:1 } }
  .result-emoji { font-size: 3.5rem; margin-bottom: 10px; }
  .result-title {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 2.2rem;
  }
  .result-desc {
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .result-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .btn-go {
    padding: 12px 32px;
    border-radius: 50px; border: none;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 1.2rem;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
  }
  .btn-go:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
  .btn-close {
    padding: 12px 24px;
    border-radius: 50px;
    border: 2px solid #ddd;
    background: white;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    color: var(--muted); cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-close:hover { border-color: #aaa; color: var(--text); }
  .coming-soon-tag {
    display: inline-block;
    background: #f5f5f5; color: #aaa;
    font-size: 0.75rem; font-weight: 800;
    letter-spacing: 1.2px; text-transform: uppercase;
    padding: 5px 16px; border-radius: 50px;
    margin-bottom: 16px;
    border: 1.5px dashed #ddd;
  }

  /* Question panel */
  .question-box {
    background: #EEF5FF;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    border-left: 5px solid #4D96FF;
    text-align: left;
  }
  .question-label {
    font-size: 0.72rem; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: #1a5cc7; margin-bottom: 8px;
  }
  .question-text {
    font-size: 1.08rem; font-weight: 700;
    color: var(--text); line-height: 1.5;
  }
  .btn-skip {
    background: none; border: none;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem; font-weight: 700;
    cursor: pointer; padding: 6px 10px;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
    margin-top: 6px;
  }
  .btn-skip:hover { background: #f0f0f0; color: var(--text); }

  /* Legend */
  .legend {
    position: relative; z-index: 1;
    margin-top: 22px;
    display: flex; gap: 10px; flex-wrap: wrap;
    justify-content: center; max-width: 440px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 7px;
    background: white; border-radius: 50px;
    padding: 6px 14px 6px 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    font-size: 0.85rem; font-weight: 700;
  }
  .legend-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    border-radius: 2px;
    animation: fall linear forwards;
    pointer-events: none; z-index: 200;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>

<p class="subtitle">Spin the wheel — see what the team does today!</p>

        <div id="riddleAnswer" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid #c8eacd;font-size:0.9rem;color:#2e7d3a;font-weight:700;"></div>
      </div>
      <button class="btn-skip" onclick="nextRiddle()">↩ Try another riddle</button>
    </div>
    <div class="result-actions" id="resultActions"></div>

</div>

  { q: "A man is found dead in a field. There is no weapon, no tracks, no sign of struggle. Just an unopened package beside him. What happened?", a: "His parachute didn't open. The package is the parachute." },
  { q: "How many times can you subtract 10 from 100?", a: "Once — after that you're subtracting from 90, then 80, etc." },
  { q: "What is the only word in the English language that ends in the letters 'mt'?", a: "Dreamt." },
  { q: "Which letter of the alphabet has the most water?", a: "C (the sea)." },
  { q: "What is at the beginning of eternity, the end of time, the beginning of every end, and the end of every place?", a: "The letter E." },
  { q: "A girl is twice as old as her brother and half as old as her father. In 22 years, her brother will be half the age of her father. How old is the daughter now?", a: "22." },
  { q: "I have no voice but tell tales. I have no life but record yours. What am I?", a: "A diary." },
  { q: "What can you break without touching it?", a: "A promise. Or silence." },
  { q: "What's black and white and red all over?", a: "A newspaper — it's 'read' all over." },
  { q: "What gets sharper the more you use it?", a: "Your brain." },
  { q: "How can a man go 8 days without sleep?", a: "He sleeps at night." },
  { q: "What do the numbers 11, 69, and 88 all have in common?", a: "They read the same upside down." },
  { q: "What starts and ends with an 'e' but only has one letter?", a: "An envelope." },
  { q: "I can be cracked, made, told, and played. What am I?", a: "A joke." },
  { q: "Mary's father has five daughters: Nana, Nene, Nini, Nono. What is the fifth daughter's name?", a: "Mary." },
  { q: "What is the maximum number of times a piece of paper can be folded in half?", a: "Seven times by hand — though a single fold doubles the thickness each time." },
  { q: "I am taken from a mine and shut up in a wooden case, and yet almost everybody uses me. What am I?", a: "A pencil." },
  { q: "What occurs once in every minute, twice in every moment, and never in a thousand years?", a: "The letter M." },
  { q: "If a red house is made of red bricks and a yellow house is made of yellow bricks, what is a green house made of?", a: "Glass." },
  { q: "What is so light that even the weakest person can hold it for hours, but so heavy the strongest man can't hold it for more than a minute?", a: "Breath." },
  { q: "What gets wetter as it dries?", a: "A towel." },
  { q: "What always ends everything?", a: "The letter G." },
  { q: "A man builds a house with four walls, each facing south. A bear walks past. What colour is the bear?", a: "White — the only place you can build a house where all four walls face south is the North Pole, where polar bears live." },
  { q: "What has 13 hearts but no other organs?", a: "A deck of cards." },
  { q: "What do you call it when it's raining ducks and geese?", a: "Foul weather." },
  { q: "You walk into a dark room. You have one match. There is a candle, a kerosene lamp, and a fireplace. Which do you light first?", a: "The match." },
  { q: "If you have a bowl with six apples and you take away four, how many apples do you have?", a: "Four — the ones you took." },
  { q: "What can you make that no one can see but you can feel?", a: "Noise." },
  { q: "What is the number of the parking space with a car in it? The sequence goes 16, 06, 68, 88, ?, 98.", a: "87 — you're looking at the image upside down." },
  { q: "A man is looking at a photo. He says 'Brothers and sisters I have none, but that man's father is my father's son.' Who is it?", a: "His son." },
  { q: "Two people are born at exactly the same time from the same parents, but are not twins. How?", a: "They're triplets — or more." },
  { q: "What is always there when you look for it but disappears when you find it?", a: "The horizon." },
  { q: "What three numbers, none of which is zero, give the same result whether multiplied or added?", a: "1, 2, and 3 (1+2+3 = 6, 1×2×3 = 6)." },
  { q: "A man can't sleep in a hotel because of a snoring stranger. He calls the front desk, hangs up, and falls asleep. Why?", a: "When the phone rang in the stranger's room, it woke him up and stopped the snoring." },
  { q: "I'm not a plant but I have leaves. I'm not alive but I can grow. I have a spine but no bones. What am I?", a: "A book." },
  { q: "How can the number four be half of five?", a: "In Roman numerals, IV is half of FIVE." },
  { q: "What belongs to you but everyone else uses it more than you?", a: "Your name." },
  { q: "What has a single eye but cannot see?", a: "A needle." },
  { q: "An electric train is heading east. In which direction does the smoke blow?", a: "There's no smoke — it's an electric train." },
  { q: "I pass in front of the sun but cast no shadow. What am I?", a: "The wind." },
  { q: "What common word becomes a palindrome when you add three letters to the end?", a: "Lemon becomes lemon + ade... actually 'Noel' becomes 'noeleon'... try: 'level' is already one." },
  { q: "What nine-letter word still remains a word when you remove one letter at a time?", a: "Startling → Starling → Staring → String → Sting → Sing → Sin → In → I." },
  { q: "What do you answer even when no one has asked you a question?", a: "A doorbell or a phone." },
  { q: "I have four wings but cannot fly. I never laugh and never cry. I'm on the same spot all day long. Tap my name and hear a song. What am I?", a: "A windmill." },
  { q: "A doctor has a brother who is a barrister but the barrister has no brother. How?", a: "The doctor is a woman." },
  { q: "What has many needles but doesn't sew?", a: "A Christmas tree." },
  { q: "What is put on a table and cut but never eaten?", a: "A deck of cards." },
  { q: "I have a tail and a head but no body. What am I?", a: "A coin." },
  { q: "Three men jump into the water but only two come out with wet hair. Why?", a: "One was bald." },
  { q: "How do you make seven even?", a: "Remove the S." },
  { q: "What do you see once in June, twice in November, and never in May?", a: "The letter N." },
  { q: "A woman lives in a skyscraper. On sunny days she takes the lift halfway and walks the rest. On rainy days she takes the lift all the way. Why?", a: "She's short — when it's raining she has an umbrella to press the higher button." },
  { q: "What kind of coat can only be put on when wet?", a: "A coat of paint." },
  { q: "What is the only English word with three consecutive pairs of double letters?", a: "Bookkeeper." },
  { q: "I'm always moving but never rest. I'm always working and feel no pain. What am I?", a: "A river." },
  { q: "What do the following have in common: a river, a mirror, a clock?", a: "They can all run." },
  { q: "I have a golden head and a golden tail but no golden body. What am I?", a: "A gold coin." },
  { q: "What is broken every time it's spoken?", a: "Silence." },
  { q: "How much dirt is in a hole that is 2m wide, 2m long, and 2m deep?", a: "None — a hole has no dirt in it." },
  { q: "What can you find in a minute but not in an hour?", a: "The letter N." },
  { q: "If you count twenty houses on your right going to school and 20 on your left on the way home, how many houses are there?", a: "Twenty — you're walking the same street." },
  { q: "Three doctors say Robert is their brother. Robert says he has no brothers. Who's lying?", a: "No one — the three doctors are his sisters." },
  { q: "I'm the son of water but when water rises I die. What am I?", a: "Ice." },
  { q: "What has a thumb and four fingers but isn't a hand?", a: "A glove." },
  { q: "What comes once a year, twice a week, and never in a day?", a: "The letter E." },
  { q: "A farmer has 17 sheep. All but 9 die. How many are left?", a: "Nine." },
  { q: "What can a child make that no adult has ever seen?", a: "A face." },
  { q: "What is it the more you have, the less you see?", a: "Darkness." },
  { q: "I can run but never walk, I have a mouth but never talk, I have a bed but never sleep. What am I?", a: "A river." },
  { q: "What is at the end of the world?", a: "The letter D." },
  { q: "What is full during the day and empty at night?", a: "A shoe." },
  { q: "What 4-letter word can be written forward, backward, or upside down and still be read from left to right?", a: "NOON." },
  { q: "I give milk and have a horn. But I'm not a cow. What am I?", a: "A milk float." },
  { q: "What speaks every language?", a: "An echo." },
  { q: "First you eat me, then you get eaten. What am I?", a: "A fish hook with bait." },
  { q: "What is lighter than a feather but even the strongest person can't hold for more than a minute?", a: "Their breath." },
  { q: "What can point in every direction but can't reach the destination by itself?", a: "A finger." },
  { q: "What do you call a bear with no teeth?", a: "A gummy bear." },
  { q: "I'm tall when I'm young and short when I'm old. What am I?", a: "A candle." },
  { q: "What is the difference between a jeweller and a jailer?", a: "One sells watches, the other watches cells." },
  { q: "What can run but never walks, has a mouth but never speaks, has a head but never cries?", a: "A river." },
  { q: "I have no life but I can die. What am I?", a: "A battery." },
  { q: "You're in a race and overtake the person in second place. What position are you in?", a: "Second place." },
  { q: "What is the next number in this sequence: 1, 2, 4, 8, 16, ?", a: "32 — each number doubles." },
  { q: "I have four letters. My first letter is in 'fish' but not in 'fist'. My second is in 'team' but not in 'tram'. My third is in 'four' but not in 'tour'. My fourth is in 'meal' but not in 'seal'. What word am I?", a: "Feel." },
  { q: "What can be swallowed but can also swallow you?", a: "Pride." },
  { q: "If two's company and three's a crowd, what are four and five?", a: "Nine." },
  { q: "What goes around and around the wood but never goes into the wood?", a: "The bark of a tree." },
  { q: "A man leaves home and turns left three times, only to return home to find two men in masks. Who are they?", a: "The catcher and umpire — he's playing baseball." },
  { q: "What do you call a cat who lives in a hospital?", a: "A first aid kit." },
  { q: "If you had a single match and entered a cold, dark room with a candle, an oil lamp, and a wood stove — which would you light first?", a: "The match." },
  { q: "What do all months have in common?", a: "At least 28 days." },
  { q: "A woman shoots her husband. Then she puts him under water for five minutes. Later they have dinner together. How?", a: "She's a photographer." },
  { q: "I have wings but I'm not a bird. I'm small and colourful. I live in meadows and gardens. I used to be something else entirely. What am I?", a: "A butterfly." },
  { q: "What word starts with 'is', ends with 'land', and has 'is' in it?", a: "Island." },
  { q: "What can go through glass without breaking it?", a: "Light." },
  { q: "I grow down as I grow up. What am I?", a: "A goose — it grows down feathers as it matures." },
  { q: "What word contains 26 letters but only three syllables?", a: "Alphabet." },
  { q: "What is the only thing that increases the more you share it?", a: "Happiness — or knowledge." },
  { q: "What do you buy to eat but never actually eat?", a: "Plates, cutlery, napkins." },
  { q: "A horse is tied to a 5-metre rope. A bale of hay is 6 metres away. Yet the horse eats the hay. How?", a: "The other end of the rope isn't tied to anything." },
  { q: "How many seconds are in a year?", a: "12 — January 2nd, February 2nd, March 2nd..." },
  { q: "I am not a bird, but I can fly through the sky. I am not a river, but I'm full of water. What am I?", a: "A cloud." },
  { q: "Which is correct: 'the yolk of an egg is white' or 'the yolk of an egg are white'?", a: "Neither — egg yolks are yellow." },
  { q: "If a plane crashed on the border of Scotland and England, where would you bury the survivors?", a: "You don't bury survivors." },
  { q: "What is unusual about the following sentence: 'The quick brown fox jumps over the lazy dog'?", a: "It contains every letter of the alphabet." },
  { q: "How many bricks does it take to complete a brick building?", a: "One — the last one." },
  { q: "What stays in a corner but travels around the world?", a: "A stamp." },
  { q: "I can be long or short. I can be grown or bought. I can be painted or left bare. I can be round or square. What am I?", a: "A fingernail." },
  { q: "What word in English is always spelled incorrectly?", a: "Incorrectly." },
  { q: "When is the only time that today comes before yesterday?", a: "In a dictionary." },
  { q: "What gets bigger every time you take from it?", a: "A hole." },
  { q: "If six children can eat six pies in six minutes, how long does it take one child to eat one pie?", a: "Six minutes." },
  { q: "A man shaves several times a day but still has a beard. How?", a: "He's a barber." },
  { q: "A man walks into a pub and asks for a glass of water. The barman pulls a gun and points it at him. The man says 'Thank you' and walks out. Why?", a: "The man had hiccups. The fright cured them. He needed the water for the same reason." },
  { q: "What has to be broken before you can use it?", a: "An egg." },
  { q: "I'm light as a feather but the strongest people can't hold me for more than a few minutes. What am I?", a: "Breath." },
  { q: "What connects these words: piano, lock, ship?", a: "They can all have a 'key'." },
  { q: "How can you throw a ball so it goes a short distance, comes to a complete stop, reverses direction, and comes back without touching anything?", a: "Throw it straight up in the air." },
  { q: "What can you add to a bucket full of water to make it lighter?", a: "Holes." },
  { q: "What do you call it when you have more than one L in a word?", a: "Parallel." },
  { q: "A man lives on the 20th floor. When he goes to work in the morning, he takes the lift all the way down. When he comes home, he takes the lift to the 10th floor and walks up. Why?", a: "He's too short to reach the 20th floor button. He can reach the 10th." },
  { q: "I can be cracked, I can be made. I can be told, I can be played. What am I?", a: "A joke." },
  { q: "What goes up when you count down?", a: "A rocket." },
  { q: "What word of 5 letters has only one left when two letters are removed?", a: "Stone — remove 'st' and you get 'one'." },
  { q: "I don't have eyes, ears, nose, or tongue, but I can see, smell, hear, and taste everything. What am I?", a: "A brain." },
  { q: "What two keys can't open any lock?", a: "A monkey and a donkey." },
  { q: "What's the only time you look at the back before the front?", a: "When reading a cheque — or in a dictionary." },
  { q: "I'm found in socks, scarves, and mittens. I'm found in the paws of playful kittens. What am I?", a: "Wool." },
  { q: "What is something you will never see again?", a: "Yesterday." },
  { q: "What can travel faster than the speed of sound?", a: "Your thoughts." },
  { q: "What letter is most useful to a deaf woman?", a: "A (hearing) aid — the letter A." },
  { q: "What can a whole apple do that half an apple cannot?", a: "Look round." },
  { q: "I have a face and two hands but no arms or legs. What am I?", a: "A clock." },
  { q: "What gets harder to catch the faster you run?", a: "Your breath." },
  { q: "What has a long neck, a name of a bird, feet of a tree, and lives in the city?", a: "A crane." },
  { q: "What is the centre of gravity?", a: "The letter V." },
  { q: "What is the most slippery country in the world?", a: "Greece." },
  { q: "What's the only word that sounds the same even after you remove four of its five letters?", a: "Queue — remove 'ueue' and you're left with 'q', still pronounced the same." },
  { q: "What can you serve but never eat?", a: "A tennis ball." },
  { q: "If you had a match and walked into a room with a candle, a fireplace, and a lamp — which do you light first?", a: "The match." },
  { q: "What has a head like a cat, feet like a cat, but is not a cat?", a: "A kitten." },
  { q: "What's the easiest way to double your money?", a: "Put it in front of a mirror." },
  { q: "What runs but never tires?", a: "Water." },
  { q: "How many times does the letter 'F' appear in this sentence: 'Finished files are the result of years of scientific study combined with the experience of years'?", a: "Six — people often miss the F in 'of'." },
  { q: "What has an eye in the middle of it?", a: "A storm — or the letter i." },
  { q: "You always walk with me but I am not your shadow. I go where you go but you never notice me. What am I?", a: "The sound of your footsteps." },
  { q: "What appears once in every minute, twice in every moment, but never in a hundred years?", a: "The letter M." },
  { q: "What goes up and down without moving?", a: "A staircase." },
  { q: "What is the difference between a cat and a comma?", a: "One has claws at the end of its paws, the other is a pause at the end of a clause." },
  { q: "I start with M, end with X, and have never in it. What am I?", a: "Mailbox." },
  { q: "What connects these: bank, sand, and river?", a: "They can all have bars." },
  { q: "What has one horn and gives milk?", a: "A milk float." },
  { q: "What is it that after you take away the whole, some still remains?", a: "The word 'wholesome'." },
  { q: "I am not a human, but I can tell you your future. What am I?", a: "A calendar." },
  { q: "What is something that everyone has seen but will never see again?", a: "Yesterday." },
  { q: "If a red house has red bricks, and a blue house has blue bricks, what does a greenhouse have?", a: "Glass." },
  { q: "What's the one thing you always have that you can never hold?", a: "A heartbeat." },
  { q: "I'm in you but not in your hand. I'm a thought but not in your head. What am I?", a: "A palm." },
  { q: "What do elves do after school?", a: "Their gnomework." },
  { q: "A man rides a horse into town on a Sunday, stays two nights, and leaves on a Sunday. How?", a: "The horse is named Sunday." },
  { q: "What has orange skin, a green hairstyle, and sounds like a parrot?", a: "A carrot." },
  { q: "What word contains all 26 letters?", a: "Alphabet." },
  { q: "A woman has as many brothers as she has sisters. Each of her brothers has twice as many sisters as brothers. How many brothers and sisters are there?", a: "Three brothers and four sisters." },
  { q: "I'm not a tool but I can help you dig. I'm not a weapon but I can hurt you. I'm part of your body but you can cut me. What am I?", a: "A fingernail." },
  { q: "What is yours but your friends use it more than you do?", a: "Your name." },
  { q: "I can be flipped, I can be folded. I make music but I'm not a record. What am I?", a: "A page of sheet music." },
  { q: "You see a dead man hanging from a beam in an empty room. The floor is wet. The room was locked from the inside. How did he die?", a: "He stood on a block of ice which melted." },
  { q: "How is the moon like a dollar?", a: "It has four quarters." },
  { q: "What has no beginning, no middle, and no end?", a: "A circle." },
  { q: "What is harder the more relaxed you are?", a: "Falling asleep deliberately." },
  { q: "What can be seen in the middle of March and April that cannot be seen at the beginning or end of either month?", a: "The letter R." },
  { q: "How can you physically stand behind your father while he is standing behind you?", a: "You are back to back." },
  { q: "What do you get if you divide the circumference of a pumpkin by its diameter?", a: "Pumpkin pi." },
  { q: "What word has kst in the middle, in the beginning, and at the end?", a: "Inkstand." },
  { q: "I'm where yesterday follows today and tomorrow is in the middle. What am I?", a: "A dictionary." },
  { q: "What can an elephant have that no other animal can have?", a: "A baby elephant." },
  { q: "What can be measured but has no length, width, or height?", a: "Temperature." },
  { q: "I am a word of six. My first two letters make a male, my first three make a female, my first four make a great man, and my whole tells you what a great woman is made of. What am I?", a: "Heroine." },
  { q: "What four-letter word ends in 'i-t' and is found on the bottom of birdcages?", a: "Grit." },
  { q: "What connects the words: cake, door, pine?", a: "Apple — apple cake, apple door... actually: they all follow 'cherry': cherry cake, cherry door? Try 'finger': fingercake, finger... Actually try: they all precede 'needle' — cake needle? Let's try: they all go with 'apple' — pineapple, apple cake, apple door? The answer is apple — pineapple." },
  { q: "What has a head and tail but no body?", a: "A coin." },
  { q: "I'm found in your pocket, in your wallet, and in your bank. But I can't be bought or sold. What am I?", a: "Your card — or your identity." },
  { q: "What am I: the more you work me, the thinner I grow. Yet I am strongest when I'm at my most used?", a: "A pencil." },
  { q: "You can see me in water but I never get wet. What am I?", a: "A reflection." },
  { q: "I travel the world but stay in one spot. What am I?", a: "A stamp." },
  { q: "What seven-letter word has hundreds of letters in it?", a: "Postbox." },
  { q: "What do you call a sleeping dinosaur?", a: "A dino-snore." },
  { q: "What would weigh more: a pound of gold or a pound of feathers?", a: "They weigh the same — a pound is a pound." },
  { q: "I am not alive, but I seem so. I follow your every move and copy everything you do. What am I?", a: "A shadow." },
  { q: "What has to be wound up before it can let you down?", a: "A clock." },
  { q: "What can you put in a wood box that will make it lighter?", a: "Holes." },
  { q: "What spends all the time on the floor but never gets dirty?", a: "Your shadow." },
  { q: "I start with P and end with E, and I have thousands of letters. What am I?", a: "Post office." },
  { q: "What two words, when combined, contain the most letters?", a: "Post Office." },
  { q: "What is harder to catch after you've thrown it than before?", a: "Your temper." },
  { q: "I can be told in a whisper, a shout, or a laugh. I can last a second or a lifetime. What am I?", a: "A story." },
  { q: "What is so light that even the tiniest person couldn't hold it for even a minute?", a: "Their breath." },
  { q: "How do you spell 'COW' in thirteen letters?", a: "SEE O DOUBLE YOU." },
  { q: "What can be recycled without being used?", a: "Empty glass bottles." },
  { q: "I am the beginning of sorrow and the end of sickness. You cannot express happiness without me, yet I am in the midst of crosses. I am always in risk yet never in danger. What am I?", a: "The letter S." },
  { q: "What fastens two people yet touches only one?", a: "A wedding ring." },
  { q: "I'm not a planet but I have a surface. I'm not alive but I breathe. I'm not water but you can drown in me. What am I?", a: "Quicksand." },
  { q: "What word is pronounced the same even after you remove four of its five letters?", a: "Queue." },
  { q: "I have wheels and flies, and I'm not an aircraft. What am I?", a: "A rubbish truck." },
  { q: "What has a bed but never sleeps, a bank but no money, and a mouth but never eats?", a: "A river." },
  { q: "I am the tool that has a handle and cuts paper, cloth, or other things. But if you reverse my name, I am what you do before you plant seeds. What am I?", a: "Scissors — reversed gives 'rossicS'... try: Shears / Reap? Or: Snap — Pans?" },
  { q: "What is there one of in every corner and two of in every room?", a: "The letter O." },
  { q: "What is the only thing you can break by naming it?", a: "Silence." },
  { q: "A man stands on one side of a river, his dog on the other. The man calls his dog, who immediately crosses the river without getting wet. There's no bridge or boat. How?", a: "The river was frozen." },
  { q: "What do you find at the end of a line?", a: "The letter E." },
  { q: "If a doctor gives you three pills and tells you to take one every half hour, how long before the pills are gone?", a: "One hour — you take the first immediately, the second after 30 minutes, the third after 60." },
  { q: "Which is correct: 'The capital of Australia is Sydney' or 'The capital of Australia is Canberra'?", a: "Canberra — most people guess Sydney." },
  { q: "A man looks at a portrait and says 'Brothers and sisters I have none, but that man's father is my father's son.' Who is in the portrait?", a: "His son." },
  { q: "What is harder to catch if you run faster?", a: "Your breath." },
  { q: "What is harder the more letters you add?", a: "A riddle." },
  { q: "How can the number 4 be half of 5?", a: "IV is half of FIVE (the Roman numeral IV is in the word FIVE)." },
  { q: "What is so sensitive that even mentioning its name will break it?", a: "Silence." },
  { q: "What word contains the same letters whether spelled forwards or backwards?", a: "Racecar, level, madam, kayak — palindromes." },
  { q: "I'm easy to lift but hard to throw. What am I?", a: "A feather." },
  { q: "What five-letter word becomes shorter when you add two more letters?", a: "Short." },
  { q: "What is as light as a feather but can't be held for more than a minute by the strongest man?", a: "Breath." },
  { q: "What do you call a snowman in the summer?", a: "A puddle." },
  { q: "What walks all day on its head?", a: "A nail in a horseshoe." },
  { q: "What is it that given one, you'll have either two or none?", a: "A choice." },
  { q: "If you have it, you want to share it. If you share it, you don't have it. What is it?", a: "A secret." },
  { q: "What kind of fish chases a mouse?", a: "A catfish." },
  { q: "What is never hungry during winter?", a: "A thermometer — it always has degrees." },
  { q: "A man is found dead in a locked room with 56 cars and no doors. How did he die?", a: "He was playing Monopoly and landed on each car." },

let audioCtx = null;
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

let lastTickSeg = -1;
function maybePlayTick(rot, speed) {
  const segIdx = Math.floor(((( 2*Math.PI - ((rot + Math.PI/2) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI)) % (2*Math.PI)) / (2*Math.PI/N))) % N;
  if (segIdx !== lastTickSeg) {
    lastTickSeg = segIdx;
    const ctx = ac();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.frequency.value = 280 + Math.min(speed * 1200, 1000);
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.055);
    osc.start(); osc.stop(ctx.currentTime + 0.06);
  }
}

function playWinChime() {
  const ctx = ac();
  [523, 659, 784, 1047, 1319].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t = ctx.currentTime + i * 0.11;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.2, t + 0.025);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.42);
    osc.start(t); osc.stop(t + 0.45);
  });
}

// ——— WHEEL ———
const canvas = document.getElementById('wheel');
const ctx2d = canvas.getContext('2d');
const N = segments.length;
const ARC = (2 * Math.PI) / N;
// Start so segment 0 is centred at top (pointer position)
let rotation = -Math.PI / 2 - ARC / 2;

function drawWheel(rot) {
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 12;
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < N; i++) {
    const s = rot + i * ARC, e = s + ARC, mid = s + ARC / 2;
    const seg = segments[i];

    // Base fill
    ctx2d.beginPath();
    ctx2d.moveTo(cx, cy);
    ctx2d.arc(cx, cy, r, s, e);
    ctx2d.closePath();
    ctx2d.fillStyle = seg.color;
    ctx2d.fill();

    // Subtle sheen
    const grad = ctx2d.createRadialGradient(cx, cy, r*0.08, cx, cy, r);
    grad.addColorStop(0, 'rgba(255,255,255,0.15)');
    grad.addColorStop(1, 'rgba(0,0,0,0.06)');
    ctx2d.fillStyle = grad;
    ctx2d.fill();

    // Dividers
    ctx2d.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx2d.lineWidth = 4;
    ctx2d.stroke();

    // Emoji — inner zone ~25% out
    const er = r * 0.26;
    ctx2d.save();
    ctx2d.translate(cx + Math.cos(mid)*er, cy + Math.sin(mid)*er);
    ctx2d.rotate(mid + Math.PI/2);
    ctx2d.font = '46px serif';
    ctx2d.textAlign = 'center';
    ctx2d.textBaseline = 'middle';
    ctx2d.fillText(seg.emoji, 0, 0);
    ctx2d.restore();

    // Label — outer zone ~68% out, large bold text
    const lr = r * 0.66;
    ctx2d.save();
    ctx2d.translate(cx + Math.cos(mid)*lr, cy + Math.sin(mid)*lr);
    ctx2d.rotate(mid + Math.PI/2);
    ctx2d.shadowColor = 'rgba(0,0,0,0.35)';
    ctx2d.shadowBlur = 5;
    ctx2d.shadowOffsetX = 1; ctx2d.shadowOffsetY = 1;
    ctx2d.font = '600 44px "Poppins", sans-serif';
    ctx2d.textAlign = 'center';
    ctx2d.textBaseline = 'middle';
    ctx2d.fillStyle = 'white';
    const words = seg.label.split(' ');
    if (words.length === 2) {
      ctx2d.fillText(words[0], 0, -27);
      ctx2d.fillText(words[1], 0, 25);
    } else {
      ctx2d.fillText(seg.label, 0, 0);
    }
    ctx2d.restore();
  }

  // Outer ring
  ctx2d.beginPath();
  ctx2d.arc(cx, cy, r, 0, 2*Math.PI);
  ctx2d.strokeStyle = 'rgba(0,0,0,0.1)';
  ctx2d.lineWidth = 9;
  ctx2d.stroke();

  // Inner circle separator
  ctx2d.beginPath();
  ctx2d.arc(cx, cy, r*0.40, 0, 2*Math.PI);
  ctx2d.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx2d.lineWidth = 3;
  ctx2d.stroke();
}

drawWheel(rotation);

// ——— SPIN ———
let spinning = false;
let qIndex = Math.floor(Math.random() * questions.length);
let prevRot = rotation, prevT = 0;

function spin() {
  if (spinning) return;
  spinning = true;
  lastTickSeg = -1;
  document.getElementById('spinBtn').disabled = true;
  try { ac().resume(); } catch(e) {}

  const totalAngle = (6 + Math.random()*5) * 2*Math.PI + Math.random()*2*Math.PI;
  const duration = 3800 + Math.random()*1000;
  const t0 = performance.now();
  const r0 = rotation;

  function ease(t) { return 1 - Math.pow(1-t, 4); }

  function frame(now) {
    const t = Math.min((now - t0) / duration, 1);
    const newRot = r0 + totalAngle * ease(t);
    const speed = prevT ? Math.abs(newRot - prevRot) / (now - prevT) : 0;
    prevRot = newRot; prevT = now;
    rotation = newRot;
    drawWheel(rotation);
    maybePlayTick(rotation, speed);
    if (t < 1) { requestAnimationFrame(frame); }
    else {
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      playWinChime();
      setTimeout(() => showResult(rotation), 220);
    }
  }
  prevT = performance.now();
  requestAnimationFrame(frame);
}

// ——— RESULT ———
function showResult(rot) {
  // Pointer is at top. Wheel started with seg 0 centred at top.
  // Find which segment centre is nearest the top (angle = -π/2)
  const normalised = ((rot + Math.PI/2) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  const idx = Math.floor(((2*Math.PI - normalised) % (2*Math.PI)) / ARC) % N;
  const seg = segments[idx];

  document.getElementById('resultEmoji').textContent = seg.emoji;
  document.getElementById('resultTitle').textContent = seg.label;
  document.getElementById('resultTitle').style.color = seg.dark;

  const qa = document.getElementById('questionArea');
  const ra = document.getElementById('riddleArea');
  const desc = document.getElementById('resultDesc');
  const actions = document.getElementById('resultActions');
  actions.innerHTML = ''; qa.style.display = 'none'; ra.style.display = 'none';

  if (seg.label === 'Mood Board') {
    desc.textContent = "Share how you're feeling today — open the mood board and show the team!";
    actions.innerHTML = `
      <button class="btn-go" style="background:linear-gradient(135deg,#FF6B6B,#FF8E53);cursor:pointer"
        onclick="window.open('https://www.dailymoodboards.com','_blank')">Open Mood Board 🎨</button>
      <button class="btn-close" onclick="closeOverlay()">Close</button>`;

  } else if (seg.label === 'Word Game') {
    const nytGames = [
      { name: 'Wordle',        url: 'https://www.nytimes.com/games/wordle/index.html',   emoji: '🟩' },
      { name: 'Connections',   url: 'https://www.nytimes.com/games/connections',         emoji: '🔗' },
      { name: 'Mini Crossword',url: 'https://www.nytimes.com/crosswords/game/mini',      emoji: '✏️' },
    ];
    // Rotate daily through the three games
    const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(),0,0)) / 86400000);
    const game = nytGames[dayOfYear % nytGames.length];
    desc.textContent = `Today's game: ${game.name} (NYT) — play together as a team!`;
    actions.innerHTML = `
      <button class="btn-go" style="background:linear-gradient(135deg,#FFD93D,#FF9500);color:#5c3d00;cursor:pointer"
        onclick="window.open('${game.url}','_blank')">Play ${game.emoji} ${game.name}</button>
      <button class="btn-close" onclick="closeOverlay()">Close</button>`;

  } else if (seg.label === 'Mini Quiz') {
    desc.textContent = "Head to JetPunk for today's daily trivia — see how many you can get!";
    actions.innerHTML = `
      <button class="btn-go" style="background:linear-gradient(135deg,#6BCB77,#3aaa50);cursor:pointer"
        onclick="window.open('https://www.jetpunk.com/daily-trivia','_blank')">Open Daily Trivia 🧠</button>
      <button class="btn-close" onclick="closeOverlay()">Close</button>`;

  } else {
    qIndex = Math.floor(Math.random() * questions.length);
    desc.textContent = "A question to get the team thinking and talking…";
    qa.style.display = 'block';
    document.getElementById('questionText').textContent = questions[qIndex];
    actions.innerHTML = `<button class="btn-close" onclick="closeOverlay()">Done ✓</button>`;
  }

  document.getElementById('overlay').classList.add('show');
  launchConfetti(seg.color);
}

let rIndex = 0;
function revealAnswer() {
  document.getElementById('riddleAnswer').style.display = 'block';
}
function nextRiddle() {
  rIndex = (rIndex + 1) % riddles.length;
  document.getElementById('riddleText').textContent = riddles[rIndex].q;
  document.getElementById('riddleAnswer').style.display = 'none';
  document.getElementById('riddleAnswer').textContent = '💡 ' + riddles[rIndex].a;
}
function nextQuestion() {
  qIndex = (qIndex + 1) % questions.length;
  document.getElementById('questionText').textContent = questions[qIndex];
}
function closeOverlay() { document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeOverlay(); });

// ——— CONFETTI ———
function launchConfetti(base) {
  const cols = [base,'#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF8E53','#A855F7'];
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `left:${Math.random()*100}vw;top:-20px;background:${cols[i%cols.length]};width:${7+Math.random()*9}px;height:${7+Math.random()*9}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2.5}s;animation-delay:${Math.random()*.4}s`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }, i * 18);
  }
}
